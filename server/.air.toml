root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/xoberon-server.exe ./cmd/api/main.go"
  bin = "./tmp/xoberon-server.exe"
  full_bin = "./tmp/xoberon-server.exe"
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["tmp", "vendor", "node_modules", "bin", "docs"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
