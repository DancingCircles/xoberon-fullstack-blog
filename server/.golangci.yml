run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    exclude-functions:
      - (*database/sql.Tx).Rollback
      - (*go.uber.org/zap.Logger).Sync

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
