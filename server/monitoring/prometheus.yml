global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alert-rules.yml'

scrape_configs:
  - job_name: 'xoberon-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:9091']
        labels:
          service: 'xoberon-api'
          environment: 'production'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node'
          environment: 'production'
